<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f3ef"/>

  <defs>
    <pattern id="hatch-concrete" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#c9c3bb" stroke-width="1"/>
    </pattern>
    <pattern id="hatch-glass" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M 0 6 L 6 0" stroke="#d8d4ce" stroke-width="0.75"/>
    </pattern>
  </defs>

  <g id="lod-0" stroke="#2a2826" stroke-width="2.5" fill="none">
    <rect x="48" y="40" width="704" height="520" rx="4"/>
    <rect x="120" y="120" width="200" height="160" stroke-dasharray="8 6" opacity="0.5"/>
    <path d="M 400 560 L 400 40" stroke="#c9c3bb" stroke-width="1.5" stroke-dasharray="4 8"/>
    <path d="M 80 300 L 720 300" stroke="#c9c3bb" stroke-width="1.5" stroke-dasharray="4 8"/>
    <text x="56" y="72" fill="#2a2826" font-family="sans-serif" font-size="16" font-weight="600">LOD-0</text>
    <text x="56" y="92" fill="#7d7870" font-family="sans-serif" font-size="11">zoom under 1.5x</text>
  </g>

  <g id="lod-1" stroke="#4a4641" stroke-width="1.5" fill="#eceae6" fill-opacity="0.4">
    <rect x="160" y="80" width="480" height="440"/>
    <rect x="200" y="140" width="120" height="100" fill="#e0dcd6"/>
    <rect x="480" y="140" width="120" height="100" fill="#e0dcd6"/>
    <rect x="320" y="360" width="160" height="80" fill="#e0dcd6"/>
    <path d="M 360 440 L 360 520 L 440 520 L 440 440" fill="none"/>
    <text x="172" y="108" fill="#4a4641" font-family="sans-serif" font-size="13" font-weight="600">+ LOD-1</text>
    <text x="172" y="124" fill="#7d7870" font-family="sans-serif" font-size="10">zoom 1.5x - 3x</text>
  </g>

  <g id="lod-2" stroke="#7d7870" stroke-width="1" fill="none">
    <rect x="200" y="140" width="120" height="100" stroke="#4a4641"/>
    <line x1="200" y1="190" x2="320" y2="190" stroke="#c9c3bb"/>
    <rect x="480" y="140" width="120" height="100" stroke="#4a4641"/>
    <line x1="540" y1="140" x2="540" y2="240"/>
    <path d="M 320 400 L 340 380 L 480 380 L 500 400"/>
    <circle cx="400" cy="480" r="6" fill="#c9c3bb" stroke="#7d7870"/>
    <text x="508" y="128" fill="#7d7870" font-family="sans-serif" font-size="12" font-weight="600">+ LOD-2</text>
    <text x="508" y="142" fill="#7d7870" font-family="sans-serif" font-size="10">zoom 3x - 6x</text>
  </g>

  <g id="lod-3" stroke="#7d7870" stroke-width="0.75" fill="none">
    <rect x="200" y="140" width="120" height="100" fill="url(#hatch-concrete)" opacity="0.55"/>
    <rect x="480" y="140" width="120" height="100" fill="url(#hatch-glass)" opacity="0.5"/>
    <line x1="48" y1="580" x2="752" y2="580" stroke="#c9c3bb"/>
    <text x="56" y="594" fill="#7d7870" font-family="sans-serif" font-size="10">8000</text>
    <text x="56" y="32" fill="#4a6b52" font-family="sans-serif" font-size="13" font-weight="600">+ LOD-3</text>
    <text x="56" y="48" fill="#7d7870" font-family="sans-serif" font-size="10">zoom 6x and above</text>
    <circle cx="624" cy="84" r="5" fill="#4a6b52" opacity="0.85"/>
    <text x="636" y="88" fill="#4a6b52" font-family="sans-serif" font-size="9">sensor</text>
  </g>
</svg>
